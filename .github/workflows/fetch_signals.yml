name: Fetch BTC Signals

on:
  schedule:
    - cron: "0 8 * * *"   # 8:00 AM UTC daily
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit data.json back to repo

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal fetch script
        env:
          CRYPTOQUANT_KEY:    ${{ secrets.CRYPTOQUANT_KEY }}
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          COINGECKO_API_KEY:  ${{ secrets.COINGECKO_API_KEY }}
        run: python scripts/fetch_signals.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git diff --staged --quiet || git commit -m "chore: update signals data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
